<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>value_claw — Portfolio Analytics</title>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {400:'#60a5fa',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8'},
            surface: {700:'#334155',800:'#1e293b',850:'#172033',900:'#0f172a',950:'#080e1b'},
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
    *{box-sizing:border-box}
    body{font-family:'Inter',system-ui,sans-serif;background:#080e1b;color:#e2e8f0}
    code,.font-mono{font-family:'JetBrains Mono',monospace}
    .card{background:#1e293b;border:1px solid rgba(51,65,85,.5);border-radius:.75rem;padding:1.25rem}
    .btn{padding:.5rem 1rem;border-radius:.5rem;font-size:.8125rem;font-weight:500;cursor:pointer;transition:all .15s}
    .btn-active{background:#2563eb;color:#fff}
    .btn-ghost{background:rgba(15,23,42,.6);border:1px solid #334155;color:#94a3b8}
    .btn-ghost:hover{background:#1e293b;color:#e2e8f0}
    .fade-in{animation:fadeIn .3s ease-out}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:#334155;border-radius:99px}
  </style>
</head>
<body class="dark h-full overflow-auto">

<div class="max-w-7xl mx-auto px-4 py-6 fade-in">
  <!-- Header -->
  <div class="flex items-center justify-between mb-6">
    <div class="flex items-center gap-3">
      <a href="/" class="text-gray-500 hover:text-gray-300 transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
      </a>
      <h1 class="text-xl font-semibold text-gray-100">Portfolio Analytics</h1>
      <span id="db-badge" class="text-[.625rem] px-2 py-0.5 rounded-full font-semibold"></span>
    </div>
    <div class="flex items-center gap-2">
      <div class="flex gap-1 mr-3">
        <button onclick="setPid('us-stocks')" id="btn-us" class="btn btn-ghost text-xs">US Stocks</button>
        <button onclick="setPid('crypto')" id="btn-crypto" class="btn btn-ghost text-xs">Crypto</button>
      </div>
      <div class="flex gap-1">
        <button onclick="setMode('simulate')" id="btn-sim" class="btn btn-ghost text-xs">Simulate</button>
        <button onclick="setMode('live')" id="btn-live" class="btn btn-ghost text-xs">Live</button>
      </div>
      <select onchange="setDays(this.value)" id="days-select" class="ml-2 bg-surface-900 border border-surface-700 text-gray-300 text-xs rounded-lg px-2 py-1.5 outline-none">
        <option value="7">7 days</option>
        <option value="30" selected>30 days</option>
        <option value="90">90 days</option>
        <option value="365">1 year</option>
      </select>
    </div>
  </div>

  <!-- Stats Cards -->
  <div class="grid grid-cols-4 gap-4 mb-6">
    <div class="card">
      <div class="text-[.625rem] text-gray-500 uppercase tracking-wider mb-1">Total Value</div>
      <div id="stat-total" class="text-2xl font-bold text-gray-100">--</div>
      <div id="stat-total-change" class="text-xs mt-1"></div>
    </div>
    <div class="card">
      <div class="text-[.625rem] text-gray-500 uppercase tracking-wider mb-1">Cash Balance</div>
      <div id="stat-cash" class="text-2xl font-bold text-gray-100">--</div>
    </div>
    <div class="card">
      <div class="text-[.625rem] text-gray-500 uppercase tracking-wider mb-1">Holdings Value</div>
      <div id="stat-holdings" class="text-2xl font-bold text-gray-100">--</div>
    </div>
    <div class="card">
      <div class="text-[.625rem] text-gray-500 uppercase tracking-wider mb-1">Unrealized P&L</div>
      <div id="stat-pnl" class="text-2xl font-bold">--</div>
    </div>
  </div>

  <!-- Main Chart -->
  <div class="card mb-6">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-sm font-semibold text-gray-300">Daily Portfolio Value</h2>
      <div id="chart-info" class="text-xs text-gray-500"></div>
    </div>
    <div style="height:320px;position:relative">
      <canvas id="value-chart"></canvas>
    </div>
  </div>

  <!-- Two column: Trades + Events -->
  <div class="grid grid-cols-2 gap-4">
    <!-- Recent Trades -->
    <div class="card">
      <h2 class="text-sm font-semibold text-gray-300 mb-3">Recent Trades</h2>
      <div id="trades-table" class="overflow-auto max-h-[400px]">
        <div class="text-xs text-gray-600 text-center py-8">Loading...</div>
      </div>
    </div>

    <!-- Portfolio Events -->
    <div class="card">
      <h2 class="text-sm font-semibold text-gray-300 mb-3">Portfolio Events</h2>
      <div id="events-table" class="overflow-auto max-h-[400px]">
        <div class="text-xs text-gray-600 text-center py-8">Loading...</div>
      </div>
    </div>
  </div>
</div>

<script>
let pid = 'us-stocks';
let mode = 'simulate';
let days = 30;
let valueChart = null;

function fmtMoney(v) {
  if (v == null) return '--';
  return '$' + Number(v).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
}

function setPid(p) { pid = p; updateButtons(); loadAll(); }
function setMode(m) { mode = m; updateButtons(); loadAll(); }
function setDays(d) { days = parseInt(d); loadAll(); }

function updateButtons() {
  document.getElementById('btn-us').className = 'btn ' + (pid === 'us-stocks' ? 'btn-active' : 'btn-ghost') + ' text-xs';
  document.getElementById('btn-crypto').className = 'btn ' + (pid === 'crypto' ? 'btn-active' : 'btn-ghost') + ' text-xs';
  document.getElementById('btn-sim').className = 'btn ' + (mode === 'simulate' ? 'btn-active' : 'btn-ghost') + ' text-xs';
  document.getElementById('btn-live').className = 'btn ' + (mode === 'live' ? 'btn-active' : 'btn-ghost') + ' text-xs';
}

async function loadAll() {
  await Promise.all([loadDailyValues(), loadTrades(), loadEvents(), loadDbStatus()]);
}

async function loadDbStatus() {
  try {
    const resp = await fetch('/api/analytics/db-status');
    const data = await resp.json();
    const badge = document.getElementById('db-badge');
    if (data.db_enabled) {
      badge.textContent = 'PostgreSQL Connected';
      badge.className = 'text-[.625rem] px-2 py-0.5 rounded-full font-semibold bg-emerald-500/10 text-emerald-400 border border-emerald-500/20';
    } else {
      badge.textContent = 'DB Offline — JSON Only';
      badge.className = 'text-[.625rem] px-2 py-0.5 rounded-full font-semibold bg-amber-500/10 text-amber-400 border border-amber-500/20';
    }
  } catch(e) { console.error(e); }
}

async function loadDailyValues() {
  try {
    const resp = await fetch(`/api/analytics/daily-values?portfolio_id=${pid}&mode=${mode}&days=${days}`);
    const data = await resp.json();

    if (!data.db_enabled) {
      const snapResp = await fetch(`/api/portfolios/${pid}/snapshots?mode=${mode}&days=${days}`);
      const snapData = await snapResp.json();
      if (snapData.ok && snapData.snapshots && snapData.snapshots.length) {
        renderChart(snapData.snapshots.map(s => ({
          date: s.timestamp.slice(0, 10),
          total_value: s.total_value,
          cash_balance: s.cash_balance,
          holdings_value: s.holdings_value,
          pnl: s.pnl,
        })));
        const last = snapData.snapshots[snapData.snapshots.length - 1];
        updateStats(last);
      } else {
        renderChart([]);
      }
      return;
    }

    if (data.data && data.data.length) {
      renderChart(data.data);
      const last = data.data[data.data.length - 1];
      updateStats(last);
    } else {
      renderChart([]);
    }
  } catch(e) { console.error('loadDailyValues:', e); renderChart([]); }
}

function updateStats(last) {
  document.getElementById('stat-total').textContent = fmtMoney(last.total_value);
  document.getElementById('stat-cash').textContent = fmtMoney(last.cash_balance);
  document.getElementById('stat-holdings').textContent = fmtMoney(last.holdings_value);
  const pnlEl = document.getElementById('stat-pnl');
  pnlEl.textContent = (last.pnl >= 0 ? '+' : '') + fmtMoney(last.pnl);
  pnlEl.className = 'text-2xl font-bold ' + (last.pnl >= 0 ? 'text-emerald-400' : 'text-red-400');
}

function renderChart(data) {
  const ctx = document.getElementById('value-chart').getContext('2d');

  if (valueChart) { valueChart.destroy(); valueChart = null; }

  if (!data.length) {
    document.getElementById('chart-info').textContent = 'No data available';
    return;
  }

  document.getElementById('chart-info').textContent = `${data.length} data points`;

  const labels = data.map(d => d.date);
  const totalValues = data.map(d => d.total_value);
  const cashValues = data.map(d => d.cash_balance);
  const holdingsValues = data.map(d => d.holdings_value);

  valueChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        {
          label: 'Total Value',
          data: totalValues,
          borderColor: '#3b82f6',
          backgroundColor: 'rgba(59,130,246,.08)',
          fill: true,
          tension: 0.3,
          borderWidth: 2,
          pointRadius: data.length > 60 ? 0 : 2,
          pointHoverRadius: 4,
        },
        {
          label: 'Holdings',
          data: holdingsValues,
          borderColor: '#34d399',
          borderWidth: 1.5,
          tension: 0.3,
          pointRadius: 0,
          borderDash: [4, 2],
        },
        {
          label: 'Cash',
          data: cashValues,
          borderColor: '#f59e0b',
          borderWidth: 1.5,
          tension: 0.3,
          pointRadius: 0,
          borderDash: [4, 2],
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { position: 'top', labels: { color: '#94a3b8', font: {size: 11}, usePointStyle: true, pointStyleWidth: 14 } },
        tooltip: {
          backgroundColor: '#1e293b',
          titleColor: '#e2e8f0',
          bodyColor: '#94a3b8',
          borderColor: '#334155',
          borderWidth: 1,
          callbacks: {
            label: ctx => ctx.dataset.label + ': ' + fmtMoney(ctx.parsed.y),
          },
        },
      },
      scales: {
        x: {
          grid: { color: 'rgba(51,65,85,.2)' },
          ticks: { color: '#64748b', font: {size: 10}, maxTicksLimit: 12 },
        },
        y: {
          grid: { color: 'rgba(51,65,85,.2)' },
          ticks: {
            color: '#64748b',
            font: {size: 10},
            callback: v => '$' + (v >= 1000 ? (v/1000).toFixed(0) + 'k' : v),
          },
        },
      },
    },
  });
}

async function loadTrades() {
  try {
    const resp = await fetch(`/api/analytics/trades?portfolio_id=${pid}&mode=${mode}&limit=30`);
    const data = await resp.json();
    const el = document.getElementById('trades-table');

    let trades = data.trades || [];
    if (!trades.length && !data.db_enabled) {
      const fallbackResp = await fetch(`/api/portfolios/${pid}/trades?mode=${mode}`);
      const fallback = await fallbackResp.json();
      if (fallback.ok && fallback.trades) trades = fallback.trades;
    }

    if (!trades.length) {
      el.innerHTML = '<div class="text-xs text-gray-600 text-center py-8">No trades recorded</div>';
      return;
    }

    let html = `<div class="grid grid-cols-[60px_50px_1fr_70px_80px_80px] gap-1 text-[.625rem] text-gray-500 uppercase tracking-wider pb-1 border-b border-surface-700/30 mb-1 sticky top-0 bg-surface-800">
      <div>Date</div><div>Side</div><div>Symbol</div><div class="text-right">Qty</div><div class="text-right">Price</div><div class="text-right">Total</div>
    </div>`;

    for (const t of trades.slice(0, 30)) {
      const ts = t.timestamp ? t.timestamp.slice(5, 10) : '';
      const sideColor = t.side === 'buy' ? 'text-emerald-400' : 'text-red-400';
      const stratBadge = t.strategy_id ? `<span class="ml-1 text-[.5rem] px-1 py-0 rounded bg-brand-600/20 text-brand-400">${t.strategy_id}</span>` : '';
      html += `<div class="grid grid-cols-[60px_50px_1fr_70px_80px_80px] gap-1 text-xs py-1.5 border-b border-surface-700/20">
        <div class="text-gray-500 font-mono">${ts}</div>
        <div class="${sideColor} font-semibold uppercase text-[.625rem]">${t.side}</div>
        <div class="text-gray-200">${t.symbol}${stratBadge}</div>
        <div class="text-right text-gray-400">${t.quantity}</div>
        <div class="text-right text-gray-300">${fmtMoney(t.price)}</div>
        <div class="text-right text-gray-300">${fmtMoney(t.total_cost)}</div>
      </div>`;
    }
    el.innerHTML = html;
  } catch(e) { console.error('loadTrades:', e); }
}

async function loadEvents() {
  try {
    const resp = await fetch(`/api/analytics/events?portfolio_id=${pid}&limit=20`);
    const data = await resp.json();
    const el = document.getElementById('events-table');

    if (!data.events || !data.events.length) {
      el.innerHTML = '<div class="text-xs text-gray-600 text-center py-8">No events recorded</div>';
      return;
    }

    let html = `<div class="grid grid-cols-[70px_80px_70px_1fr] gap-1 text-[.625rem] text-gray-500 uppercase tracking-wider pb-1 border-b border-surface-700/30 mb-1 sticky top-0 bg-surface-800">
      <div>Date</div><div>Type</div><div class="text-right">Amount</div><div>Details</div>
    </div>`;

    const typeColors = {
      topup: 'text-emerald-400',
      cashout: 'text-amber-400',
      switch: 'text-brand-400',
    };

    for (const ev of data.events) {
      const ts = ev.timestamp ? ev.timestamp.slice(5, 16).replace('T', ' ') : '';
      const color = typeColors[ev.event_type] || 'text-gray-400';
      html += `<div class="grid grid-cols-[70px_80px_70px_1fr] gap-1 text-xs py-1.5 border-b border-surface-700/20">
        <div class="text-gray-500 font-mono text-[.625rem]">${ts}</div>
        <div class="${color} font-semibold text-[.625rem]">${ev.event_type}</div>
        <div class="text-right text-gray-300">${ev.amount ? fmtMoney(ev.amount) : '--'}</div>
        <div class="text-gray-500 truncate">${ev.details || ''}</div>
      </div>`;
    }
    el.innerHTML = html;
  } catch(e) { console.error('loadEvents:', e); }
}

updateButtons();
loadAll();
setInterval(loadAll, 60000);
</script>
</body>
</html>
